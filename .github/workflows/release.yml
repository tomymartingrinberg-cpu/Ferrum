name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-18-dev libclang-18-dev clang-18 cmake ninja-build

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=$(llvm-config-18 --cmakedir)
          cmake --build build --target ferrumc -j$(nproc)
          strip build/ferrumc

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME:-v0.3.0}
          tar -czf ferrumc-${TAG}-linux-${{ matrix.arch }}.tar.gz -C build ferrumc

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ferrumc-*.tar.gz

  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            llvm_triple: arm64-apple-macosx11.0
          - arch: x86_64
            llvm_triple: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 + cmake + ninja (arm64)
        if: matrix.arch == 'arm64'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Install cmake + ninja (arm64)
        if: matrix.arch == 'arm64'
        run: brew install cmake ninja

      - name: Install LLVM 18 + cmake + ninja (x86_64 via Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          # macos-14 ships with x86_64 Homebrew at /usr/local
          arch -x86_64 /usr/local/bin/brew install llvm@18 cmake ninja
          echo "LLVM_PATH=$(arch -x86_64 /usr/local/bin/brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Build (arm64)
        if: matrix.arch == 'arm64'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="${{ env.LLVM_PATH }}/lib/cmake/llvm" \
            -DCMAKE_DISABLE_FIND_PACKAGE_LibEdit=TRUE
          cmake --build build --target ferrumc -j$(sysctl -n hw.logicalcpu)
          strip build/ferrumc

      - name: Build (x86_64 via Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="${{ env.LLVM_PATH }}/lib/cmake/llvm" \
            -DCMAKE_DISABLE_FIND_PACKAGE_LibEdit=TRUE
          arch -x86_64 cmake --build build --target ferrumc -j$(sysctl -n hw.logicalcpu)
          strip build/ferrumc

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME:-v0.3.0}
          tar -czf ferrumc-${TAG}-macos-${{ matrix.arch }}.tar.gz -C build ferrumc

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ferrumc-*.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 dev + cmake + ninja via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/mingw64/lib/cmake/llvm
          cmake --build build --target ferrumc -j$(nproc)

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME:-v0.3.0}
          7z a ferrumc-${TAG}-windows-x86_64.zip ./build/ferrumc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ferrumc-*.zip

  build-freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y llvm18 cmake ninja
          run: |
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_DIR=/usr/local/llvm18/lib/cmake/llvm
            cmake --build build --target ferrumc -j$(sysctl -n hw.ncpu)
            strip build/ferrumc

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME:-v0.3.0}
          tar -czf ferrumc-${TAG}-freebsd-x86_64.tar.gz -C build ferrumc

      - uses: actions/upload-artifact@v4
        with:
          name: freebsd-x86_64
          path: ferrumc-*.tar.gz

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows, build-freebsd]
    runs-on: ubuntu-22.04
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Ferrum-language ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## Ferrum-language ${{ github.ref_name }}

            Systems programming language with C syntax and compile-time memory safety via a borrow checker and ownership system — compiled to native code through LLVM 18.

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `ferrumc-*-linux-x86_64.tar.gz` |
            | Linux | aarch64 | `ferrumc-*-linux-aarch64.tar.gz` |
            | macOS | x86_64 (Intel, cross-compiled) | `ferrumc-*-macos-x86_64.tar.gz` |
            | macOS | arm64 (Apple Silicon) | `ferrumc-*-macos-arm64.tar.gz` |
            | Windows | x86_64 | `ferrumc-*-windows-x86_64.zip` |
            | FreeBSD | x86_64 | `ferrumc-*-freebsd-x86_64.tar.gz` |

            Verify integrity with `SHA256SUMS.txt`.

            ### Quick start
            ```bash
            tar -xzf ferrumc-*-linux-x86_64.tar.gz
            ./ferrumc hello.fe -o hello
            ./hello
            ```
          files: artifacts/*
